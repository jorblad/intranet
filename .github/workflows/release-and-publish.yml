name: Release and Publish Docker Image

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine bump label
        id: label
        run: |
          labels=$(jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH" | tr '\n' ' ')
          echo "PR labels: $labels"
          bump=""
          if echo "$labels" | grep -qw major; then bump=major; fi
          if echo "$labels" | grep -qw minor; then
            if [ "$bump" != "major" ]; then bump=minor; fi
          fi
          if echo "$labels" | grep -qw patch; then
            if [ "$bump" = "" ]; then bump=patch; fi
          fi
          if [ -z "$bump" ]; then
            echo "No semantic label (major/minor/patch) on merged PR — exiting." >&2
            echo "bump=none" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "bump=$bump" >> $GITHUB_OUTPUT

      - name: Exit if no bump label
        if: steps.label.outputs.bump == 'none'
        run: echo "No bump requested; nothing to do."

      - name: Setup Git
        if: steps.label.outputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next semver
        if: steps.label.outputs.bump != 'none'
        id: semver
        run: |
          # get latest tag (vMAJOR.MINOR.PATCH)
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then latest="v0.0.0"; fi
          echo "latest tag: $latest"
          sem=${latest#v}
          IFS='.' read -r major minor patch <<< "$sem"
          case "${{ steps.label.outputs.bump }}" in
            major)
              major=$((major + 1)); minor=0; patch=0 ;;
            minor)
              minor=$((minor + 1)); patch=0 ;;
            patch)
              patch=$((patch + 1)) ;;
          esac
          new_tag="v${major}.${minor}.${patch}"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          echo "new_tag=$new_tag"

      - name: Login to GHCR
        if: steps.label.outputs.bump != 'none'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image to GHCR
        if: steps.label.outputs.bump != 'none'
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/intranet-backend:${{ steps.semver.outputs.new_tag }}
            ghcr.io/${{ github.repository_owner }}/intranet-backend:latest

      - name: Optionally push to Docker Hub
        if: steps.label.outputs.bump != 'none'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Docker Hub credentials not provided; skipping Docker Hub push"
            exit 0
          fi
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          docker tag ghcr.io/${{ github.repository_owner }}/intranet-backend:${{ steps.semver.outputs.new_tag }} ${DOCKERHUB_USERNAME}/intranet-backend:${{ steps.semver.outputs.new_tag }}
          docker tag ghcr.io/${{ github.repository_owner }}/intranet-backend:latest ${DOCKERHUB_USERNAME}/intranet-backend:latest
          docker push ${DOCKERHUB_USERNAME}/intranet-backend:${{ steps.semver.outputs.new_tag }}
          docker push ${DOCKERHUB_USERNAME}/intranet-backend:latest

      - name: Create Git tag and GitHub release (API)
        if: steps.label.outputs.bump != 'none'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.semver.outputs.new_tag }}
        run: |
          set -e
          REPO=${{ github.repository }}
          OWNER=$(echo "$REPO" | cut -d'/' -f1)
          REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)
          BODY="Release created by merge PR #${{ github.event.pull_request.number }}"
          PAYLOAD=$(jq -n --arg tag "${NEW_TAG}" --arg name "Release ${NEW_TAG}" --arg body "$BODY" '{tag_name:$tag, name:$name, body:$body, draft:false, prerelease:false}')
          resp=$(curl -s -w "%{http_code}" -o /tmp/release_resp -X POST -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" -d "$PAYLOAD" "https://api.github.com/repos/${REPO}/releases")
          if [ "$resp" = "201" ]; then
            echo "Release created"
            cat /tmp/release_resp
          else
            echo "Failed to create release (HTTP $resp)"
            cat /tmp/release_resp
            exit 1
          fi
