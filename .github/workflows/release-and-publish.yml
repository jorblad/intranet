name: Release and Publish Docker Image

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump label
        id: label
        run: |
          labels=$(jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH" | tr '\n' ' ')
          echo "PR labels: $labels"
          bump=""
          if echo "$labels" | grep -qw major; then bump=major; fi
          if echo "$labels" | grep -qw minor; then
            if [ "$bump" != "major" ]; then bump=minor; fi
          fi
          if echo "$labels" | grep -qw patch; then
            if [ "$bump" = "" ]; then bump=patch; fi
          fi
          if [ -z "$bump" ]; then
            echo "No semantic label (major/minor/patch) on merged PR — exiting." >&2
            echo "bump=none" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "bump=$bump" >> $GITHUB_OUTPUT

      - name: Exit if no bump label
        if: steps.label.outputs.bump == 'none'
        run: echo "No bump requested; nothing to do."

      - name: Setup Git
        if: steps.label.outputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next semver
        if: steps.label.outputs.bump != 'none'
        id: semver
        run: |
          # get latest tag (vMAJOR.MINOR.PATCH)
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then latest="v0.0.0"; fi
          echo "latest tag: $latest"
          sem=${latest#v}
          IFS='.' read -r major minor patch <<< "$sem"
          case "${{ steps.label.outputs.bump }}" in
            major)
              major=$((major + 1)); minor=0; patch=0 ;;
            minor)
              minor=$((minor + 1)); patch=0 ;;
            patch)
              patch=$((patch + 1)) ;;
          esac
          new_tag="v${major}.${minor}.${patch}"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          echo "new_tag=$new_tag"

      - name: Login to GHCR
        if: steps.label.outputs.bump != 'none'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image to GHCR
        if: steps.label.outputs.bump != 'none'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/intranet-backend:${{ steps.semver.outputs.new_tag }}
            ghcr.io/${{ github.repository_owner }}/intranet-backend:latest

      - name: Optionally push to Docker Hub
        if: steps.label.outputs.bump != 'none'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Docker Hub credentials not provided; skipping Docker Hub push"
            exit 0
          fi
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          docker tag ghcr.io/${{ github.repository_owner }}/intranet-backend:${{ steps.semver.outputs.new_tag }} ${DOCKERHUB_USERNAME}/intranet-backend:${{ steps.semver.outputs.new_tag }}
          docker tag ghcr.io/${{ github.repository_owner }}/intranet-backend:latest ${DOCKERHUB_USERNAME}/intranet-backend:latest
          docker push ${DOCKERHUB_USERNAME}/intranet-backend:${{ steps.semver.outputs.new_tag }}
          docker push ${DOCKERHUB_USERNAME}/intranet-backend:latest

      - name: Create Git tag and GitHub release
        if: steps.label.outputs.bump != 'none'
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.semver.outputs.new_tag }}
          release_name: Release ${{ steps.semver.outputs.new_tag }}
          body: "Release created by merge PR #${{ github.event.pull_request.number }}"
          draft: false
          prerelease: false

      - name: Update docker-compose.yml to use released image tag
        if: steps.label.outputs.bump != 'none'
        env:
          NEW_TAG: ${{ steps.semver.outputs.new_tag }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          python - <<'PY'
            import re
            import os
            from pathlib import Path

            fp = Path('docker-compose.yml')
            txt = fp.read_text()
            repo_owner = os.environ.get('REPO_OWNER', '')
            new_tag = os.environ.get('NEW_TAG', 'latest')
            # Replace a build: context: ./backend block with image entry. This keeps a simple pattern replacement.
            pattern = r"backend:\n(?:\s+.*\n)*?\s+build:\n\s+context: ./backend\n(?:\s+.*\n)*?\s+ports:.*\n"
            replacement = f"backend:\n  image: ghcr.io/{repo_owner}/intranet-backend:{new_tag}\n  ports:\n    - \"8000:8000\"\n"
            txt2 = re.sub(pattern, replacement, txt, flags=re.M)
            if txt2 == txt:
                print('Pattern not matched; no change made to docker-compose.yml')
            else:
                fp.write_text(txt2)
                print('Updated docker-compose.yml to use image tag')
          PY

      - name: Commit docker-compose update to release branch
        if: steps.label.outputs.bump != 'none'
        env:
          NEW_TAG: ${{ steps.semver.outputs.new_tag }}
        run: |
          set -e
          RELEASE_BRANCH="release/${NEW_TAG}"
          echo "Creating branch ${RELEASE_BRANCH} and committing docker-compose update"
          git fetch origin
          # create new branch from default branch
          git checkout -b "${RELEASE_BRANCH}"
          git add docker-compose.yml || true
          if git commit -m "chore(release): switch compose to use image $NEW_TAG"; then
            git push --set-upstream origin "${RELEASE_BRANCH}"
          else
            echo "No changes to commit; not pushing branch"
          fi

      - name: Create pull request for release branch
        if: steps.label.outputs.bump != 'none'
        env:
          NEW_TAG: ${{ steps.semver.outputs.new_tag }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BRANCH="release/${NEW_TAG}"
          TITLE="chore(release): update compose to ${NEW_TAG}"
          BODY="Automated compose update for release ${NEW_TAG}"
          API="https://api.github.com/repos/${REPO}/pulls"
          PAYLOAD=$(printf '{"title":"%s","head":"%s","base":"%s","body":"%s"}' "$TITLE" "$BRANCH" "main" "$BODY")
          resp=$(curl -s -w "%{http_code}" -o /tmp/pr_resp -X POST -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" -d "$PAYLOAD" "$API")
          if [ "$resp" = "201" ]; then
            echo "Pull request created successfully"
            cat /tmp/pr_resp
            pr_number=$(jq -r '.number' /tmp/pr_resp)
            echo "PR_NUMBER=$pr_number" >> $GITHUB_ENV
          elif [ "$resp" = "422" ]; then
            echo "Pull request may already exist or no changes; attempting to find existing PR"
            owner=$(echo "$REPO" | cut -d'/' -f1)
            # find open PR for this head
            existing=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${REPO}/pulls?state=open&head=${owner}:${BRANCH}")
            pr_number=$(echo "$existing" | jq -r '.[0].number')
            if [ "$pr_number" != "null" ] && [ -n "$pr_number" ]; then
              echo "Found existing PR #$pr_number"
              echo "PR_NUMBER=$pr_number" >> $GITHUB_ENV
            else
              echo "No existing PR found; response:"
              cat /tmp/pr_resp
              exit 1
            fi
          else
            echo "Failed to create pull request (HTTP $resp)"
            cat /tmp/pr_resp
            exit 1
          fi

      - name: Enable auto-merge for release PR
        if: steps.label.outputs.bump != 'none'
        env:
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ -z "${PR_NUMBER}" ]; then
            echo "No PR_NUMBER available; skipping auto-merge enable"
            exit 0
          fi
          echo "Enabling auto-merge for PR #${PR_NUMBER}"
          # get pull request node_id
          pr_node=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}" | jq -r '.node_id')
          if [ -z "$pr_node" ] || [ "$pr_node" = "null" ]; then
            echo "Could not determine PR node id; aborting"
            exit 1
          fi
          graphql='{"query":"mutation EnablePRAutoMerge($id:ID!){enablePullRequestAutoMerge(input:{pullRequestId:$id,mergeMethod:MERGE}){pullRequest{number}}}","variables":{"id":"'$pr_node'"}}'
          resp=$(curl -s -H "Authorization: bearer ${GITHUB_TOKEN}" -H "Content-Type: application/json" -d "$graphql" https://api.github.com/graphql)
          echo "$resp" | jq || true
          if echo "$resp" | jq -e '.data.enablePullRequestAutoMerge.pullRequest.number' >/dev/null 2>&1; then
            echo "Auto-merge enabled for PR #${PR_NUMBER}"
          else
            echo "Failed to enable auto-merge; response: $resp"
            exit 1
          fi
