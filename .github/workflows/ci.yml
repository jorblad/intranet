name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
      # Use a local sqlite file for CI to avoid requiring a separate DB service.
      DATABASE_URL: sqlite:///./backend/test_app.db
      SECRET_KEY: test-secret
      # Allow frontend origin used in dev runs
      ALLOWED_ORIGINS: http://localhost:9000
      # Valkey defaults (not required for tests but set for clarity)
      VALKEY_HOST: valkey
      VALKEY_PORT: '6379'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install system build packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev pkg-config
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r test-requirements.txt
      - name: Run backend tests
        working-directory: ./backend
        run: |
          # Run tests quietly; PYTHONPATH is set at job-level so imports resolve
          pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: intranet-frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./intranet-frontend
        run: npm ci
      - name: Build frontend
        working-directory: ./intranet-frontend
        run: npm run build --if-present
