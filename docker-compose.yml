services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: intranet
      POSTGRES_PASSWORD: intranet_password
      POSTGRES_DB: intranet_db
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
  
  valkey:
    image: valkey/valkey:latest
    command: valkey-server
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

  backend:
    image: ghcr.io/jorblad/intranet-backend:latest
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./intranet-frontend/dist/spa:/frontend:ro
    environment:
      - STATIC_DIR=/frontend
      - DATABASE_URL=postgresql+psycopg2://intranet:intranet_password@db:5432/intranet_db
      # Admin credentials used by the DB init script. Override via environment
      # or a .env file.
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
    ports:
      - "8000:8000"
      - "8200:8000"
    depends_on:
      - db
      - valkey

volumes:
  postgres_data:
  valkey_data: