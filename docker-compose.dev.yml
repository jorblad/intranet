services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: intranet
      POSTGRES_PASSWORD: intranet_password
      POSTGRES_DB: intranet_db
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
  
  valkey:
    image: valkey/valkey:latest
    command: valkey-server
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+psycopg2://intranet:intranet_password@db:5432/intranet_db
      - SECRET_KEY=dev-secret
      - ACCESS_TOKEN_EXPIRE_MINUTES=120
      - ALLOWED_ORIGINS=http://localhost:9000
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
    ports:
      - "8200:8000"
    depends_on:
      - db
      - valkey

  frontend:
    image: node:18
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 9000 --no-open"
    environment:
      - API_PROXY_TARGET=http://backend:8000
    volumes:
      - ./intranet-frontend:/app
    ports:
      - "9000:9000"
    depends_on:
      - backend

volumes:
  postgres_data:
  valkey_data:
